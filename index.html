<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Weekly Training Program</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0a;
    color: #f0ede8;
    font-family: 'Georgia', serif;
    padding-bottom: 80px;
  }
  header {
    background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
    border-bottom: 1px solid #222;
    padding: 24px 20px 0;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #888;
    font-family: 'Helvetica Neue', sans-serif;
    font-weight: 400;
    margin-bottom: 6px;
  }
  .header-title {
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 20px;
    letter-spacing: -0.5px;
  }
  .tabs {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    padding: 10px 14px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #666;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Helvetica Neue', sans-serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 400;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .tab.active { font-weight: 700; }

  .content { max-width: 700px; margin: 0 auto; padding: 32px 20px; }

  .day-hero {
    border-left: 3px solid var(--accent);
    padding-left: 20px;
    margin-bottom: 32px;
  }
  .day-hero-inner { display: flex; align-items: center; gap: 12px; }
  .day-emoji { font-size: 32px; }
  .day-theme {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    font-family: 'Helvetica Neue', sans-serif;
    margin-bottom: 2px;
  }
  .day-name { font-size: 24px; font-weight: 400; }

  .run-card {
    background: linear-gradient(135deg, var(--accent-18), var(--accent-08));
    border: 1px solid var(--accent-44);
    border-radius: 12px;
    padding: 18px 22px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .run-emoji { font-size: 28px; }
  .run-type {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .run-distance { font-size: 22px; font-weight: 400; }
  .run-pace { font-size: 13px; color: #aaa; font-family: 'Helvetica Neue', sans-serif; margin-top: 2px; }

  .rest-card {
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 40px 24px;
    text-align: center;
    margin-bottom: 24px;
  }
  .rest-emoji { font-size: 48px; margin-bottom: 12px; }
  .rest-title { font-size: 18px; margin-bottom: 8px; }
  .rest-sub { color: #666; font-family: 'Helvetica Neue', sans-serif; font-size: 13px; line-height: 1.6; }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #555;
    font-family: 'Helvetica Neue', sans-serif;
    margin-bottom: 12px;
  }
  .warmup-wrap { margin-bottom: 24px; }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    background: #151515;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12px;
    font-family: 'Helvetica Neue', sans-serif;
    color: #ccc;
  }
  .tag.cooldown {
    background: #0e0e0e;
    border-color: #1e1e1e;
    color: #888;
  }

  .block { margin-bottom: 12px; }
  .block-header {
    width: 100%;
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    color: #f0ede8;
    text-align: left;
    transition: all 0.2s ease;
  }
  .block-header.open {
    border-color: var(--accent-66);
    border-radius: 10px 10px 0 0;
    background: #151515;
  }
  .block-name { font-size: 15px; margin-bottom: 3px; }
  .block-sets { font-size: 11px; color: #666; font-family: 'Helvetica Neue', sans-serif; letter-spacing: 0.05em; }
  .block-arrow {
    color: var(--accent);
    font-size: 18px;
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }
  .block-arrow.open { transform: rotate(180deg); }

  .block-body {
    background: #0e0e0e;
    border: 1px solid var(--accent-44);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    display: none;
  }
  .block-body.open { display: block; }

  .exercise {
    padding: 14px 20px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .exercise:last-child { border-bottom: none; }
  .ex-name { font-size: 14px; margin-bottom: 2px; }
  .ex-note { font-size: 11px; color: #666; font-family: 'Helvetica Neue', sans-serif; }
  .ex-reps {
    font-size: 12px;
    color: var(--accent);
    font-family: 'Helvetica Neue', sans-serif;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-align: right;
    flex-shrink: 0;
  }

  .cooldown-wrap { margin-top: 28px; }

  .equip-card {
    margin-top: 40px;
    padding: 16px 20px;
    background: #0d0d0d;
    border-radius: 10px;
    border: 1px solid #1a1a1a;
  }
  .equip-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #444;
    font-family: 'Helvetica Neue', sans-serif;
    margin-bottom: 8px;
  }
  .equip-text { font-size: 13px; color: #777; font-family: 'Helvetica Neue', sans-serif; line-height: 1.7; }
</style>
</head>
<body>

<header>
  <div class="header-label">Weekly Training Program</div>
  <div class="header-title">Muscle · Core · Mobility · Endurance</div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="content" id="content"></div>

<script>
const program = [
  {
    day: "Monday", label: "Push + Core", theme: "STRENGTH", color: "#E8563A", icon: "💪",
    run: null,
    warmup: ["20 arm circles", "10 shoulder rolls each way", "10 cat-cow stretches", "30s deep squat hold"],
    blocks: [
      { name: "Push Superset", sets: "4 sets", exercises: [
        { name: "Push-up Handle Push-ups", reps: "12–15 reps", note: "Full depth, elbows at 45°" },
        { name: "Wide Push-ups", reps: "10 reps", note: "Chest stretch at bottom" },
      ]},
      { name: "Shoulder & Band", sets: "3 sets", exercises: [
        { name: "Band Overhead Press", reps: "15 reps", note: "Light band, control the eccentric" },
        { name: "Band Lateral Raise", reps: "15 reps each side", note: "" },
        { name: "Pike Push-ups", reps: "8–10 reps", note: "Hips high, head through" },
      ]},
      { name: "Core Circuit", sets: "3 rounds", exercises: [
        { name: "Ab Wheel Rollout", reps: "8–10 reps", note: "Knees if needed — don't arch lower back" },
        { name: "Plank Hold", reps: "45 seconds", note: "" },
        { name: "Dead Bug", reps: "10 reps each side", note: "" },
      ]},
    ],
    cooldown: ["30s doorframe chest stretch", "1min child's pose", "30s each pec stretch", "Neck rolls 30s"],
    equip: "Mat · Ab wheel · Push-up handles · Resistance bands"
  },
  {
    day: "Tuesday", label: "Run + Mobility", theme: "CARDIO", color: "#3A9CE8", icon: "🏃",
    run: { distance: "3–5 km", pace: "Conversational pace — can hold a sentence", type: "Easy aerobic run" },
    warmup: ["5 min brisk walk", "10 leg swings each side", "10 hip circles each side"],
    blocks: [
      { name: "Post-Run Mobility Flow", sets: "1 round — hold each 45–60s", exercises: [
        { name: "90/90 Hip Stretch", reps: "60s each side", note: "Sit tall, rotate gently" },
        { name: "Pigeon Pose", reps: "60s each side", note: "" },
        { name: "World's Greatest Stretch", reps: "5 reps each side", note: "Lunge + rotate + reach" },
        { name: "Band-Assisted Hamstring Stretch", reps: "60s each leg", note: "Use light band around foot" },
        { name: "Thoracic Spine Rotation", reps: "10 reps each side", note: "Side-lying, arm sweeps open" },
        { name: "Couch Stretch", reps: "60s each leg", note: "Hip flexor priority" },
      ]},
    ],
    cooldown: ["2 min box breathing", "Full body shake-out"],
    equip: "Mat · Light resistance band · Running shoes"
  },
  {
    day: "Wednesday", label: "Pull + Legs", theme: "STRENGTH", color: "#8B5CF6", icon: "🦵",
    run: null,
    warmup: ["20 band pull-aparts", "10 hip hinges", "10 glute bridges", "30s squat hold"],
    blocks: [
      { name: "Band Pull Circuit", sets: "4 sets", exercises: [
        { name: "Band Bent-Over Row", reps: "15 reps", note: "Medium band, squeeze scapula at top" },
        { name: "Band Face Pull", reps: "15 reps", note: "External rotation at end range" },
        { name: "Band Bicep Curl", reps: "12 reps", note: "" },
      ]},
      { name: "Lower Body", sets: "4 sets", exercises: [
        { name: "Bulgarian Split Squat", reps: "10 each leg", note: "Use mat for rear foot" },
        { name: "Band-Resisted Glute Bridge", reps: "20 reps", note: "Band across hips" },
        { name: "Single-Leg Romanian Deadlift", reps: "10 each side", note: "Hinge at hip, slight bend in knee" },
      ]},
      { name: "Core", sets: "3 rounds", exercises: [
        { name: "Ab Wheel Rollout", reps: "10 reps", note: "" },
        { name: "Hollow Body Hold", reps: "30 seconds", note: "Lower back pressed to mat" },
        { name: "Russian Twist", reps: "20 reps", note: "" },
      ]},
    ],
    cooldown: ["30s hamstring stretch each", "60s butterfly stretch", "Child's pose 60s"],
    equip: "Mat · Ab wheel · Resistance bands"
  },
  {
    day: "Thursday", label: "Active Recovery", theme: "RECOVER", color: "#10B981", icon: "🧘",
    run: null,
    warmup: [],
    blocks: [
      { name: "Full Body Flexibility Flow", sets: "Move slowly — feel every stretch", exercises: [
        { name: "Sun Salutation Flow", reps: "5 rounds", note: "Slow, 5 breaths per pose" },
        { name: "Seated Forward Fold", reps: "2 min", note: "" },
        { name: "Lizard Pose", reps: "90s each side", note: "Hip flexor + adductor" },
        { name: "Thread the Needle", reps: "60s each side", note: "Thoracic rotation" },
        { name: "Supine Twist", reps: "60s each side", note: "" },
        { name: "Happy Baby Pose", reps: "2 min", note: "" },
        { name: "Legs Up the Wall", reps: "3 min", note: "Recovery + circulation" },
      ]},
    ],
    cooldown: ["5 min savasana — full stillness"],
    equip: "Mat · Light resistance band"
  },
  {
    day: "Friday", label: "Full Body + Run", theme: "POWER", color: "#F59E0B", icon: "⚡",
    run: { distance: "4–6 km", pace: "Moderate — push slightly", type: "Tempo/moderate effort run" },
    warmup: ["Jump rope 3 min easy", "10 jumping jacks", "10 hip circles"],
    blocks: [
      { name: "Power Circuit — 3 rounds", sets: "Minimal rest between exercises, 90s between rounds", exercises: [
        { name: "Jump Rope", reps: "60 seconds", note: "" },
        { name: "Handle Push-up to T-Rotation", reps: "10 reps", note: "Rotate and reach at top" },
        { name: "Squat Jump", reps: "15 reps", note: "" },
        { name: "Band Pull-Apart", reps: "20 reps", note: "" },
        { name: "Ab Wheel Rollout", reps: "8 reps", note: "" },
        { name: "Reverse Lunge", reps: "12 each leg", note: "" },
      ]},
    ],
    cooldown: ["Full lower body stretch 5 min", "Chest opener 60s", "Breathwork 2 min"],
    equip: "Mat · Ab wheel · Push-up handles · Jump rope · Resistance bands"
  },
  {
    day: "Saturday", label: "Long Run + Core", theme: "ENDURANCE", color: "#EF4444", icon: "🏅",
    run: { distance: "6–10 km", pace: "Easy — this is your longest run", type: "Long slow distance run" },
    warmup: ["5 min walk", "Dynamic leg swings", "Hip circles"],
    blocks: [
      { name: "Post-Run Core Burnout", sets: "2 rounds", exercises: [
        { name: "Ab Wheel Rollout", reps: "10 reps", note: "" },
        { name: "Plank", reps: "60 seconds", note: "" },
        { name: "Mountain Climbers", reps: "30 seconds", note: "" },
        { name: "Bicycle Crunches", reps: "20 reps", note: "" },
        { name: "Superman Hold", reps: "10 reps × 3s hold", note: "Lower back extension" },
      ]},
    ],
    cooldown: ["10 min full body stretch — take your time", "Focus on hips, hamstrings, calves"],
    equip: "Mat · Ab wheel · Running shoes"
  },
  {
    day: "Sunday", label: "Full Rest", theme: "REST", color: "#6B7280", icon: "😴",
    run: null,
    warmup: [],
    blocks: [
      { name: "Optional: Light Walk or Foam Roll", sets: "", exercises: [
        { name: "15–30 min easy walk", reps: "", note: "No intensity — just movement" },
        { name: "Foam rolling if available", reps: "1–2 min per muscle group", note: "" },
      ]},
    ],
    cooldown: ["Sleep 7–9 hours — this is where you grow"],
    equip: "None — rest day"
  },
];

let activeDay = 0;
let openBlock = null;

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = program.map((d, i) => `
    <button class="tab ${i === activeDay ? 'active' : ''}"
      style="${i === activeDay ? `border-bottom-color:${d.color};color:${d.color}` : ''}"
      onclick="switchDay(${i})">${d.day.slice(0,3)}</button>
  `).join('');
}

function renderContent() {
  const d = program[activeDay];
  const accent = d.color;
  let html = '';

  // Set CSS vars
  document.body.style.setProperty('--accent', accent);
  document.body.style.setProperty('--accent-18', hexToRgba(accent, 0.1));
  document.body.style.setProperty('--accent-08', hexToRgba(accent, 0.05));
  document.body.style.setProperty('--accent-44', hexToRgba(accent, 0.27));
  document.body.style.setProperty('--accent-66', hexToRgba(accent, 0.4));

  // Day hero
  html += `<div class="day-hero">
    <div class="day-hero-inner">
      <span class="day-emoji">${d.icon}</span>
      <div>
        <div class="day-theme">${d.theme}</div>
        <div class="day-name">${d.day} — ${d.label}</div>
      </div>
    </div>
  </div>`;

  // Run
  if (d.run) {
    html += `<div class="run-card">
      <span class="run-emoji">🏃</span>
      <div>
        <div class="run-type">${d.run.type}</div>
        <div class="run-distance">${d.run.distance}</div>
        <div class="run-pace">${d.run.pace}</div>
      </div>
    </div>`;
  }

  // Rest day
  if (d.theme === 'REST') {
    html += `<div class="rest-card">
      <div class="rest-emoji">😴</div>
      <div class="rest-title">Full Rest Day</div>
      <div class="rest-sub">Rest is not optional — it's when muscle is built.<br>Sleep 7–9 hours. Eat well. Hydrate.</div>
    </div>`;
  }

  // Warmup
  if (d.warmup.length > 0) {
    html += `<div class="warmup-wrap">
      <div class="section-label">Warm-Up</div>
      <div class="tags">${d.warmup.map(w => `<span class="tag">${w}</span>`).join('')}</div>
    </div>`;
  }

  // Blocks
  d.blocks.forEach((block, bi) => {
    const isOpen = openBlock === bi;
    html += `<div class="block">
      <button class="block-header ${isOpen ? 'open' : ''}" onclick="toggleBlock(${bi})">
        <div>
          <div class="block-name">${block.name}</div>
          <div class="block-sets">${block.sets}</div>
        </div>
        <span class="block-arrow ${isOpen ? 'open' : ''}">▾</span>
      </button>
      <div class="block-body ${isOpen ? 'open' : ''}">
        ${block.exercises.map(ex => `
          <div class="exercise">
            <div>
              <div class="ex-name">${ex.name}</div>
              ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
            </div>
            ${ex.reps ? `<div class="ex-reps">${ex.reps}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>`;
  });

  // Cooldown
  if (d.cooldown && d.cooldown.length > 0) {
    html += `<div class="cooldown-wrap">
      <div class="section-label">Cool-Down</div>
      <div class="tags">${d.cooldown.map(c => `<span class="tag cooldown">${c}</span>`).join('')}</div>
    </div>`;
  }

  // Equipment
  html += `<div class="equip-card">
    <div class="equip-label">Equipment Used Today</div>
    <div class="equip-text">${d.equip}</div>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

function switchDay(i) {
  activeDay = i;
  openBlock = null;
  renderTabs();
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleBlock(bi) {
  openBlock = openBlock === bi ? null : bi;
  renderContent();
}

renderTabs();
renderContent();
</script>
</body>
</html>
